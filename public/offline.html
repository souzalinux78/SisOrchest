<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0b0b" />
    <title>SisOrchest - Offline</title>
    <style>
      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
        background: #0b0b0b;
        color: #ffffff;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card {
        max-width: 420px;
        width: 100%;
        background: #131313;
        border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 18px;
        padding: 1.8rem;
        text-align: center;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 0.6rem;
        color: #d4af37;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.75);
      }
      .hint {
        margin-top: 1rem;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Você está offline</h1>
      <p>Conecte-se à internet para acessar o SisOrchest.</p>
      <p class="hint">Assim que a conexão voltar, o app será sincronizado.</p>
    </div>
  </body>
</html>
